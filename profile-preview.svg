<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap');
            .title { font-family: 'Roboto', sans-serif; font-size: 60px; font-weight: 700; fill: #1A1C1E; }
            .url { font-family: 'Roboto', sans-serif; font-size: 24px; font-weight: 500; fill: #001D36; }
        </style>
        
        <!-- MD3 Yumuşak Tonal Gölge -->
        <filter id="md-shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.05" />
        </filter>
    </defs>

    <!-- Arka Plan (MD3 Surface) -->
    <rect width="1200" height="630" fill="#FDFBFF" />

    <!-- MD3 Dekoratif Arka Plan Şekilleri -->
    <circle cx="1100" cy="100" r="300" fill="#D7E3F7" opacity="0.6"/>
    <circle cx="100" cy="550" r="350" fill="#D1E4FF" opacity="0.6"/>
    <circle cx="200" cy="50" r="150" fill="#EDEDF4" opacity="0.8"/>
    <circle cx="1000" cy="550" r="200" fill="#F3F3FA" opacity="0.8"/>

    <!-- Ana Kart (MD3 Surface Container Low) -->
    <rect x="150" y="90" width="900" height="450" rx="48" fill="#F3F3FA" filter="url(#md-shadow)" />

    <!-- Tipografi (Başlık) -->
    <text x="600" y="300" class="title" text-anchor="middle">Erdoğan Demirtaş</text>

    <!-- Site Adresi Butonu (MD3 Primary Container) -->
    <rect x="425" y="360" width="350" height="52" rx="26" fill="#D1E4FF" />
    <text x="600" y="395" class="url" text-anchor="middle">erdogandemirtas.github.io</text>
</svg>